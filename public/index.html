<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Central de Testes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12151A;
    --bg-soft:#1B2027;
    --paper:#F5F1E8;
    --paper-2:#ECE6D6;
    --ink:#22201B;
    --ink-soft:#5B564C;
    --slate:#8891A0;
    --red:#C4342B;
    --gold:#D4A93D;
    --sage:#5C7A5A;
    --line:rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,0.035) 1px, transparent 0);
    background-size: 22px 22px;
    color:var(--paper);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:28px 32px 18px;
    border-bottom:1px solid var(--line);
  }
  .brandmark{display:flex;align-items:center;gap:12px;}
  .brandmark .dot{width:10px;height:10px;border-radius:2px;background:var(--red);transform:rotate(45deg);}
  .brandmark h1{font-size:20px;letter-spacing:0.02em;margin:0;font-weight:700;}
  .brandmark p{margin:2px 0 0;font-size:12.5px;color:var(--slate);}
  .btn{
    font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;
    border:none;border-radius:7px;padding:10px 16px;cursor:pointer;
    transition:transform .12s ease, background .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--red);color:#fff;}
  .btn-primary:hover{background:#a92a22;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--paper);}
  .btn-ghost:hover{border-color:var(--slate);}
  .btn-gold{background:var(--gold);color:#231a02;}

  .lanes{
    display:flex;gap:18px;padding:24px 32px;overflow-x:auto;
  }
  .lane{
    position:relative;flex:0 0 280px;background:var(--paper);color:var(--ink);
    border-radius:4px;padding:20px 18px 18px;
    box-shadow:0 8px 22px rgba(0,0,0,0.28);
    transition:transform .15s ease;
  }
  .lane:hover{transform:translateY(-3px);}
  .pin{
    position:absolute;top:-9px;left:24px;width:18px;height:18px;border-radius:50%;
    background:var(--gold);box-shadow:0 3px 6px rgba(0,0,0,0.35);
    border:2px solid rgba(0,0,0,0.15);
  }
  .lane-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .lane h3{margin:0;font-size:16.5px;font-family:'Space Grotesk',sans-serif;font-weight:700;}
  .lane .niche{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
  .status-pill{
    font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;
    text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;
  }
  .status-testando{background:#E3DCC8;color:#6b6142;}
  .status-vencedor{background:var(--gold);color:#3a2b02;}
  .status-pausado{background:#ddd6c9;color:#8a8272;}

  .lane .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;margin:14px 0;}
  .lane .stat label{display:block;font-size:9.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;}
  .lane .stat input{
    width:100%;border:none;border-bottom:1.5px solid var(--paper-2);background:transparent;
    font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--ink);padding:2px 0;
  }
  .lane .stat input:focus{outline:none;border-color:var(--red);}
  .lane-actions{display:flex;gap:6px;margin-top:12px;}
  .lane-actions .btn{flex:1;padding:8px 10px;font-size:12px;}
  select.status-select{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;border:1px solid var(--paper-2);
    background:var(--paper);color:var(--ink-soft);border-radius:5px;padding:3px 5px;
  }
  .add-lane{
    flex:0 0 200px;border:1.5px dashed var(--line);border-radius:4px;
    display:flex;align-items:center;justify-content:center;color:var(--slate);
    cursor:pointer;font-size:13.5px;font-weight:600;min-height:220px;
  }
  .add-lane:hover{border-color:var(--gold);color:var(--gold);}

  .section-label{
    padding:0 32px;margin-top:8px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;
    color:var(--slate);text-transform:uppercase;
  }
  .log{padding:14px 32px 60px;display:flex;flex-direction:column;gap:10px;}
  .log-entry{
    display:grid;grid-template-columns:90px 130px 1fr auto;gap:14px;align-items:center;
    background:var(--bg-soft);border:1px solid var(--line);border-radius:6px;padding:12px 16px;
  }
  .log-entry .tag{
    font-size:11px;font-weight:600;padding:4px 8px;border-radius:4px;text-align:center;
    color:#fff;
  }
  .log-entry .format{font-size:12px;color:var(--slate);}
  .log-entry .caption{font-size:13px;line-height:1.4;color:#DCD8CE;white-space:pre-wrap;}
  .log-empty{color:var(--slate);font-size:13.5px;padding:6px 0;}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(10,12,15,0.72);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--paper);color:var(--ink);width:100%;max-width:480px;
    border-radius:8px;padding:26px;max-height:88vh;overflow-y:auto;
  }
  .modal h2{margin:0 0 4px;font-family:'Space Grotesk',sans-serif;font-size:19px;}
  .modal .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px;}
  .field input,.field select,.field textarea{
    width:100%;border:1.5px solid var(--paper-2);background:#fff;border-radius:6px;
    padding:9px 10px;font-family:'Inter',sans-serif;font-size:13.5px;color:var(--ink);
  }
  .field textarea{min-height:70px;resize:vertical;font-family:'Inter',sans-serif;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--red);}
  .modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}
  .result-box{
    margin-top:16px;background:#fff;border:1.5px solid var(--paper-2);border-radius:6px;
    padding:14px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;min-height:60px;
  }
  .loading-dots::after{content:'...';animation:dots 1.2s steps(4,end) infinite;}
  @keyframes dots{0%,20%{content:'.';}40%{content:'..';}60%,100%{content:'...';}}
  .close-x{position:absolute;top:16px;right:18px;background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;}
  .connect-row{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11.5px;}
  .connect-dot{width:8px;height:8px;border-radius:50%;background:var(--slate);flex-shrink:0;}
  .connect-dot.on{background:var(--sage);}
  .connect-link{background:none;border:none;color:var(--gold);font-size:11.5px;text-decoration:underline;cursor:pointer;padding:0;}
  .publish-status{margin-top:12px;font-size:12.5px;padding:10px 12px;border-radius:6px;display:none;}
  .publish-status.ok{display:block;background:#e6f0e5;color:#2f4a2d;}
  .publish-status.err{display:block;background:#f5e2df;color:#7a2a1f;}
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:4px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brandmark">
    <div class="dot"></div>
    <div>
      <h1 class="display">Central de Testes</h1>
      <p>Suas contas em experimento, lado a lado</p>
    </div>
  </div>
  <button class="btn btn-ghost" id="resetBtn">Limpar dados</button>
</div>

<div class="section-label">Contas em teste</div>
<div class="lanes" id="lanes"></div>

<div class="section-label" style="margin-top:20px;">Registro de conteúdo gerado</div>
<div class="log" id="log"></div>

<!-- Modal: nova conta -->
<div class="overlay" id="overlayAccount">
  <div class="modal" style="position:relative;">
    <button class="close-x" data-close="overlayAccount">&times;</button>
    <h2>Nova conta</h2>
    <div class="sub">Cada conta é um experimento separado.</div>
    <div class="field">
      <label>Nome / @usuário</label>
      <input id="accName" placeholder="@achadosdachina.br">
    </div>
    <div class="field">
      <label>Nicho / tema</label>
      <input id="accNiche" placeholder="Importação da China, achadinhos">
    </div>
    <div class="field">
      <label>Tom de voz</label>
      <select id="accTone">
        <option>Descontraído e direto (gírias, emojis)</option>
        <option>Educativo e confiável</option>
        <option>Autoridade / insider</option>
        <option>Formal e institucional</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-close="overlayAccount">Cancelar</button>
      <button class="btn btn-primary" id="saveAccountBtn">Criar conta</button>
    </div>
  </div>
</div>

<!-- Modal: conectar Instagram -->
<div class="overlay" id="overlayConnect">
  <div class="modal" style="position:relative;">
    <button class="close-x" data-close="overlayConnect">&times;</button>
    <h2>Conectar Instagram</h2>
    <div class="sub">Fica guardado só neste navegador — não é enviado pra mim nem pra ninguém.</div>
    <div class="field">
      <label>ID da conta Instagram Business</label>
      <input id="connIgId" placeholder="Ex: 17841414976595015">
    </div>
    <div class="field">
      <label>Token de acesso</label>
      <input id="connToken" type="password" placeholder="Cole o token IGAAM...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-close="overlayConnect">Cancelar</button>
      <button class="btn btn-primary" id="saveConnectBtn">Salvar conexão</button>
    </div>
  </div>
</div>

<!-- Modal: gerar conteúdo -->
<div class="overlay" id="overlayGen">
  <div class="modal" style="position:relative;">
    <button class="close-x" data-close="overlayGen">&times;</button>
    <h2>Gerar conteúdo</h2>
    <div class="sub" id="genSub">para a conta</div>
    <div class="field">
      <label>Formato</label>
      <select id="genFormat">
        <option>Reel (roteiro + legenda)</option>
        <option>Carrossel (5 slides)</option>
        <option>Legenda de post único</option>
        <option>Story</option>
      </select>
    </div>
    <div class="field">
      <label>Tema ou produto</label>
      <input id="genTopic" placeholder="Ex: mini projetor portátil, achado da semana">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-close="overlayGen">Cancelar</button>
      <button class="btn btn-primary" id="genBtn">Gerar com IA</button>
    </div>
    <div class="result-box" id="genResult" style="display:none;"></div>
    <div class="field" id="genImageRow" style="margin-top:14px;">
      <label>Link público da imagem (obrigatório pra publicar)</label>
      <input id="genImageUrl" placeholder="https://exemplo.com/foto.jpg">
    </div>
    <div class="modal-actions" id="genSaveRow" style="display:flex;">
      <button class="btn btn-ghost" id="genSaveBtn">Salvar no registro</button>
      <button class="btn btn-gold" id="genPublishBtn">Publicar no Instagram</button>
    </div>
    <div class="publish-status" id="publishStatus"></div>
  </div>
</div>

<script>
const LANE_COLORS = ['#C4342B','#3E6B8A','#5C7A5A','#B4622D','#7A5C99','#2B7A78'];
let accounts = [];
let logEntries = [];
let activeAccountId = null;

async function loadData(){
  try{
    const acc = await window.storage.get('accounts', false);
    accounts = acc ? JSON.parse(acc.value) : [];
  }catch(e){ accounts = []; }
  try{
    const log = await window.storage.get('log-entries', false);
    logEntries = log ? JSON.parse(log.value) : [];
  }catch(e){ logEntries = []; }
  if(accounts.length === 0){
    accounts = [{
      id: 'seed-1', name:'@achadosdachina.br', niche:'Importação da China, achadinhos',
      tone:'Descontraído e direto (gírias, emojis)', status:'testando',
      seguidores:'', posts:'', engajamento:''
    }];
  }
  renderLanes();
  renderLog();
}

async function persistAccounts(){
  try{ await window.storage.set('accounts', JSON.stringify(accounts), false); }
  catch(e){ console.error('Falha ao salvar contas', e); }
}
async function persistLog(){
  try{ await window.storage.set('log-entries', JSON.stringify(logEntries), false); }
  catch(e){ console.error('Falha ao salvar registro', e); }
}

function colorFor(id){
  const idx = accounts.findIndex(a=>a.id===id);
  return LANE_COLORS[idx % LANE_COLORS.length] || '#555';
}

function renderLanes(){
  const el = document.getElementById('lanes');
  el.innerHTML = '';
  accounts.forEach(acc=>{
    const div = document.createElement('div');
    div.className = 'lane';
    const statusClass = acc.status === 'vencedor' ? 'status-vencedor' : (acc.status === 'pausado' ? 'status-pausado' : 'status-testando');
    const statusLabel = acc.status === 'vencedor' ? 'Vencedor' : (acc.status === 'pausado' ? 'Pausado' : 'Testando');
    div.innerHTML = `
      <div class="pin" style="background:${colorFor(acc.id)}"></div>
      <div class="lane-top">
        <div>
          <h3>${escapeHtml(acc.name)}</h3>
          <div class="niche">${escapeHtml(acc.niche)}</div>
        </div>
        <span class="status-pill ${statusClass}">${statusLabel}</span>
      </div>
      <div class="stats">
        <div class="stat"><label>Seguidores</label><input data-field="seguidores" data-id="${acc.id}" value="${acc.seguidores||''}" placeholder="0"></div>
        <div class="stat"><label>Posts/semana</label><input data-field="posts" data-id="${acc.id}" value="${acc.posts||''}" placeholder="0"></div>
        <div class="stat" style="grid-column:1/3;"><label>Engajamento (obs.)</label><input data-field="engajamento" data-id="${acc.id}" value="${acc.engajamento||''}" placeholder="Ex: reels rodam, carrossel não"></div>
      </div>
      <select class="status-select" data-status-id="${acc.id}">
        <option value="testando" ${acc.status==='testando'?'selected':''}>Testando</option>
        <option value="vencedor" ${acc.status==='vencedor'?'selected':''}>Vencedor</option>
        <option value="pausado" ${acc.status==='pausado'?'selected':''}>Pausado</option>
      </select>
      <div class="lane-actions">
        <button class="btn btn-primary" data-gen-id="${acc.id}">Gerar conteúdo</button>
        <button class="btn btn-ghost" data-del-id="${acc.id}">Remover</button>
      </div>
      <div class="connect-row">
        <span class="connect-dot ${acc.igToken ? 'on' : ''}"></span>
        <button class="connect-link" data-connect-id="${acc.id}">${acc.igToken ? 'Instagram conectado' : 'Conectar Instagram'}</button>
      </div>
    `;
    el.appendChild(div);
  });
  const addDiv = document.createElement('div');
  addDiv.className = 'add-lane';
  addDiv.id = 'addLaneBtn';
  addDiv.textContent = '+ Nova conta';
  el.appendChild(addDiv);

  el.querySelectorAll('input[data-field]').forEach(inp=>{
    inp.addEventListener('change', e=>{
      const id = e.target.getAttribute('data-id');
      const field = e.target.getAttribute('data-field');
      const acc = accounts.find(a=>a.id===id);
      if(acc){ acc[field] = e.target.value; persistAccounts(); }
    });
  });
  el.querySelectorAll('select[data-status-id]').forEach(sel=>{
    sel.addEventListener('change', e=>{
      const id = e.target.getAttribute('data-status-id');
      const acc = accounts.find(a=>a.id===id);
      if(acc){ acc.status = e.target.value; persistAccounts(); renderLanes(); }
    });
  });
  el.querySelectorAll('[data-gen-id]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      activeAccountId = e.target.getAttribute('data-gen-id');
      const acc = accounts.find(a=>a.id===activeAccountId);
      document.getElementById('genSub').textContent = 'para ' + acc.name;
      document.getElementById('genTopic').value = '';
      document.getElementById('genResult').style.display = 'none';
      document.getElementById('genImageUrl').value = '';
      document.getElementById('publishStatus').className = 'publish-status';
      document.getElementById('overlayGen').classList.add('show');
    });
  });
  el.querySelectorAll('[data-connect-id]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      activeAccountId = e.target.getAttribute('data-connect-id');
      const acc = accounts.find(a=>a.id===activeAccountId);
      document.getElementById('connIgId').value = acc.igId || '';
      document.getElementById('connToken').value = acc.igToken || '';
      document.getElementById('overlayConnect').classList.add('show');
    });
  });
  el.querySelectorAll('[data-del-id]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const id = e.target.getAttribute('data-del-id');
      accounts = accounts.filter(a=>a.id!==id);
      persistAccounts();
      renderLanes();
    });
  });
  document.getElementById('addLaneBtn').addEventListener('click', ()=>{
    document.getElementById('accName').value='';
    document.getElementById('accNiche').value='';
    document.getElementById('overlayAccount').classList.add('show');
  });
}

function renderLog(){
  const el = document.getElementById('log');
  if(logEntries.length === 0){
    el.innerHTML = '<div class="log-empty">Nada gerado ainda. Escolha uma conta acima e clique em "Gerar conteúdo".</div>';
    return;
  }
  el.innerHTML = '';
  logEntries.slice().reverse().forEach(entry=>{
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `
      <span class="mono" style="font-size:11px;color:var(--slate);">${entry.date}</span>
      <span class="tag" style="background:${entry.color}">${escapeHtml(entry.accountName)}</span>
      <span class="caption"><span class="format">${escapeHtml(entry.format)} · ${escapeHtml(entry.topic)}</span><br>${escapeHtml(entry.content)}</span>
      <span></span>
    `;
    el.appendChild(div);
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('[data-close]').forEach(btn=>{
  btn.addEventListener('click', ()=> closeOverlay(btn.getAttribute('data-close')));
});

document.getElementById('saveAccountBtn').addEventListener('click', async ()=>{
  const name = document.getElementById('accName').value.trim();
  const niche = document.getElementById('accNiche').value.trim();
  const tone = document.getElementById('accTone').value;
  if(!name){ return; }
  accounts.push({
    id: 'acc-' + Date.now(),
    name, niche, tone, status:'testando', seguidores:'', posts:'', engajamento:''
  });
  await persistAccounts();
  renderLanes();
  closeOverlay('overlayAccount');
});

document.getElementById('saveConnectBtn').addEventListener('click', async ()=>{
  const acc = accounts.find(a=>a.id===activeAccountId);
  acc.igId = document.getElementById('connIgId').value.trim();
  acc.igToken = document.getElementById('connToken').value.trim();
  await persistAccounts();
  renderLanes();
  closeOverlay('overlayConnect');
});

document.getElementById('genBtn').addEventListener('click', async ()=>{
  const acc = accounts.find(a=>a.id===activeAccountId);
  const format = document.getElementById('genFormat').value;
  const topic = document.getElementById('genTopic').value.trim();
  if(!topic){ alert('Escreve o tema ou produto primeiro.'); return; }
  const resultBox = document.getElementById('genResult');
  resultBox.style.display = 'block';
  resultBox.innerHTML = '<span class="loading-dots">Gerando</span>';
  document.getElementById('genSaveRow').style.display = 'none';
  document.getElementById('genImageRow').style.display = 'none';
  document.getElementById('publishStatus').className = 'publish-status';

  const prompt = `Você é um criador de conteúdo para Instagram no Brasil.
Conta: ${acc.name}
Nicho: ${acc.niche}
Tom de voz: ${acc.tone}
Formato pedido: ${format}
Tema/produto: ${topic}

Escreva o conteúdo pronto pra usar, em português do Brasil, seguindo o tom de voz da conta. Se for Reel, inclua roteiro curto (cenas) + legenda. Se for carrossel, liste os 5 slides. Seja direto, sem introduções nem explicações extras — só o conteúdo final.`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const text = (data.content || []).map(b => b.text || '').join('\n').trim();
    resultBox.textContent = text || 'Não recebi conteúdo. Tenta de novo.';
    document.getElementById('genSaveRow').style.display = text ? 'flex' : 'none';
    document.getElementById('genImageRow').style.display = text ? 'block' : 'none';
    resultBox.dataset.generated = text;
  }catch(e){
    resultBox.textContent = 'Erro ao gerar: ' + (e.message || e) + ' — abre o console do navegador (F12) pra ver mais detalhes.';
    console.error(e);
  }
});

document.getElementById('genSaveBtn').addEventListener('click', async ()=>{
  const acc = accounts.find(a=>a.id===activeAccountId);
  const format = document.getElementById('genFormat').value;
  const topic = document.getElementById('genTopic').value.trim();
  const content = document.getElementById('genResult').dataset.generated || '';
  logEntries.push({
    date: new Date().toLocaleDateString('pt-BR'),
    accountName: acc.name,
    color: colorFor(acc.id),
    format, topic, content
  });
  await persistLog();
  renderLog();
  closeOverlay('overlayGen');
});

document.getElementById('genPublishBtn').addEventListener('click', async ()=>{
  const acc = accounts.find(a=>a.id===activeAccountId);
  const statusBox = document.getElementById('publishStatus');
  const imageUrl = document.getElementById('genImageUrl').value.trim();
  const caption = document.getElementById('genResult').dataset.generated || '';

  if(!acc.igId || !acc.igToken){
    statusBox.className = 'publish-status err';
    statusBox.textContent = 'Conecta o Instagram primeiro (link "Conectar Instagram" no card da conta).';
    return;
  }
  if(!imageUrl){
    statusBox.className = 'publish-status err';
    statusBox.textContent = 'Cola o link público da imagem antes de publicar.';
    return;
  }

  statusBox.className = 'publish-status';
  statusBox.style.display = 'block';
  statusBox.innerHTML = '<span class="loading-dots">Publicando</span>';

  try{
    const proxyRes = await fetch('https://instagram-proxy-neon.vercel.app/api/publish', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        igId: acc.igId,
        token: acc.igToken,
        imageUrl: imageUrl,
        caption: caption
      })
    });
    const data = await proxyRes.json();

    if(data.error){
      throw new Error(data.error);
    }

    statusBox.className = 'publish-status ok';
    statusBox.textContent = 'Publicado com sucesso no Instagram!';
  }catch(e){
    statusBox.className = 'publish-status err';
    statusBox.textContent = 'Não foi possível publicar: ' + e.message;
    console.error(e);
  }
});

document.getElementById('resetBtn').addEventListener('click', async ()=>{
  if(!confirm('Isso apaga todas as contas e o registro. Confirma?')) return;
  accounts = [];
  logEntries = [];
  await persistAccounts();
  await persistLog();
  renderLanes();
  renderLog();
});

loadData();
</script>
</body>
</html>
